<head>

    <style>
        body {
            font-family: 'arial', sans-serif;
            background: linear-gradient(135deg, #78DADE 0%, #fad0c4 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: auto;
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #3CB5B5;
            margin-bottom: 30px;
        }
        .question {
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #f0f0f0;
            transition: transform 0.2s;
        }
        .question:hover {
            transform: scale(1.02);
        }
        label {
            display: block;
            background: #fff;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        label:hover {
            background: #78DADE;
            color: #fff;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #78DADE;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #78DADE;
        }
        #resultat {
            text-align: center;
            font-size: 22px;
            margin-top: 25px;
            font-weight: bold;
        }
        @media (max-width: 700px) {
            .container { width: 95%; padding: 20px; }
            button { font-size: 16px; padding: 12px 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz Vocabulaire Anglais niveau Sixième - A1/A1+</h1>

    <button id="validerBtn">Valider</button>
    <button id="recommencerBtn" style="display:none;">Recommencer</button>

</div>

  // FEELINGS
  { question: "happy", choix: ["triste", "content", "fatigué"], bonneReponse: 1 },
  { question: "sad", choix: ["heureux", "triste", "énervé"], bonneReponse: 1 },

function melangerTableau(tab){
    for(let i=tab.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [tab[i],tab[j]]=[tab[j],tab[i]];
    }
}

const nombreQuestions = 10;
let quizSelection = [];

function afficherQuiz(){
    const quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML="";
    melangerTableau(questions);
    quizSelection = questions.slice(0,nombreQuestions);

    quizSelection.forEach((q,index)=>{
        const div=document.createElement("div");
        div.classList.add("question");
        let html=`<p>${index+1}. Traduire : <strong>${q.question}</strong></p>`;
        const choixMelanges=[...q.choix];
        melangerTableau(choixMelanges);
        choixMelanges.forEach(c=>{
            html+=`<label><input type="radio" name="q${index}" value="${c}">${c}</label>`;
        });
        div.innerHTML=html;
        quizDiv.appendChild(div);
    });

    document.getElementById("resultat").innerHTML="";
    document.getElementById("recommencerBtn").style.display="none";
    document.getElementById("validerBtn").style.display="block";
}

function validerQuiz(){
    let score=0;
    quizSelection.forEach((q,index)=>{
        const reponse=document.querySelector(`input[name="q${index}"]:checked`);
        if(reponse && reponse.value===q.choix[q.bonneReponse]) score++;
    });
    const pourcentage=(score/quizSelection.length)*100;
    let niveau="";
    if(pourcentage>=80) niveau="Excellent";
    else if(pourcentage>=60) niveau="Bon 👍";
    else if(pourcentage>=40) niveau="Moyen";
    else niveau="À améliorer";

    document.getElementById("resultat").innerHTML=`Score : ${score} / ${quizSelection.length}<br>Niveau : ${niveau}`;
    document.getElementById("validerBtn").style.display="none";
    document.getElementById("recommencerBtn").style.display="block";
}

document.getElementById("validerBtn").addEventListener("click", validerQuiz);
document.getElementById("recommencerBtn").addEventListener("click", afficherQuiz);

afficherQuiz();
</script>
